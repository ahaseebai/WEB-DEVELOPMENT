<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOX model in CSS | WEB DEVELOPMENT</title>
    <style>
        .box{
            background-color:rgb(36, 1, 1);
        }
        .box1{
            color:yellow;
            padding:10px;
            margin:5px ;
            border:2px solid blue;
            height:200px;
            box-sizing:border-box;

        }
        .box2{
            color:rgb(141, 134, 134);
        }
    </style>
</head>

<body>
    <div class="box box1">Box sizing: border-box : It basically gives height along with padding,  borders' height to particular element</div>
    <div class="box box2">Abdul Haseeb Memon</div>
<br>



</body>

</html>
