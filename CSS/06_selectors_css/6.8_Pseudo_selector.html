<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo Selector | Selectors in CSS | WEB DEVELOPMENT</title>
    <style>
         /* a:link{
        color:rgb(22, 6, 6);
       }
        */
       a:active{
        color:rgb(95, 99, 95);
       }
       
       a:hover{
        color:rgb(184, 171, 29);
       }
       a:visited{
        color:green;
       }
       p:first-child{
        color: green;

       }
      
    </style>

</head>

<body>

    <h1>Pseudo Selectors in CSS</h1>
    <right><img src="css.png" alt="css image loading" width="300px"></right>


    <h3>
        <ol>
            <li>Pseudo selectors</li>
            <p> Pseudo-selectors in CSS are used to style elements based on their state or position, like hover, focus,
                or first child, using a colon :.
            </p>
            <p>we use : for innitializing it</p>

        </ol>
    </h3>
    <div>
        <a href="https://www.Google.com" target=_blank>GOOGLE </a>
    </div>

    <div>
        <p>hello!: first-child (wher p is first child)</p>
    </div>
    



</body>
