<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Elements | WEB DEVELOPMENT</title>
</head>

<body>
    <h1>Video Tag</h1>
    <!--loop, muted, autoplay, controls are the attributes of audio and video tags-->
    <video width="320" height="240" controls loop>
        <source src="agentic.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <hr>
    <h1>Audio Tag</h1>
    <audio controls autoplay>
        <source src="heyboy.mp3" type="audio/mpeg">
        Your browser does not support the audio tag.
    </audio>

    <!--preload attribute can be used to specify whether the media should be preloaded  auto, metadata, or none-->
    <h1>SVG Tag</h1>
    <svg width="100" height="100">
        <circle cx="50" cy="50" r="40" stroke="green" stroke-width="4" fill="yellow">
    </svg>
    <h1>iframe Tag</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/XZwBNDGuWGU?si=F-ploQQ1tJF-L45t"
        title="YouTube video player" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    <br>
    <iframe width="560" height="315" src="https://www.sbbusba.edu.pk/">

    </iframe>

</body>

</html>
